<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NF Love Story - Our Private Playlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-pink: #f26891;
            --glass-bg: rgba(255, 255, 255, 0.8);
        }

        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, #ffeef1 0%, #f7d1d7 100%);
            color: #5d4a4a; overflow-x: hidden;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 7%; background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 22px; font-weight: 700; color: #333; }
        .logo span { color: var(--primary-pink); }

        /* প্লেলিস্ট কন্টেইনার */
        .playlist-section {
            width: 90%; max-width: 900px; margin: 30px auto;
            background: var(--glass-bg); padding: 20px; border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px;
            border: 1px solid white;
        }

        /* ভিডিও প্লেয়ার */
        .video-side { width: 100%; }
        .video-box {
            position: relative; padding-bottom: 56.25%; height: 0;
            overflow: hidden; border-radius: 20px; background: #000;
        }
        .video-box iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        /* গানের লিস্ট */
        .list-side {
            max-height: 400px; overflow-y: auto; padding-right: 10px;
        }
        .list-side h4 { margin-top: 0; color: var(--primary-pink); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .song-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px; border-radius: 15px; background: white;
            margin-bottom: 10px; cursor: pointer; transition: 0.3s;
            border: 1px solid transparent;
        }
        .song-item:hover { background: #fff0f3; border-color: var(--primary-pink); }
        .song-item.active { background: var(--primary-pink); color: white; }
        
        .song-item img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
        .song-info { flex: 1; }
        .song-info div { font-size: 13px; font-weight: 600; }
        .song-info span { font-size: 11px; opacity: 0.8; }

        /* স্ক্রলবার ডিজাইন */
        .list-side::-webkit-scrollbar { width: 5px; }
        .list-side::-webkit-scrollbar-thumb { background: var(--primary-pink); border-radius: 10px; }

        @media (max-width: 768px) {
            .playlist-section { grid-template-columns: 1fr; }
            .list-side { max-height: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><span>NF</span> Love Story</div>
        <i class="fas fa-heart" style="color: var(--primary-pink);"></i>
    </header>

    <h3 style="text-align: center; margin-top: 30px;">🎵 Our Love Playlist</h3>

    <div class="playlist-section">
        <div class="video-side">
            <div class="video-box">
                <iframe id="mainPlayer" src="https://www.youtube.com/embed/rV9Vp-2P0hE?modestbranding=1&rel=0" allowfullscreen></iframe>
            </div>
            <p id="nowPlaying" style="margin-top: 15px; font-weight: 600; font-size: 14px; text-align: center;">এখন চলছে: আমাদের প্রিয় গান</p>
        </div>

        <div class="list-side">
            <h4>গানের তালিকা</h4>
            
            <div class="song-item active" onclick="changeSong('rV9Vp-2P0hE', 'আমাদের প্রিয় গান', this)">
                <img src="https://img.youtube.com/vi/rV9Vp-2P0hE/default.jpg">
                <div class="song-info">
                    <div>আমাদের প্রিয় গান</div>
                    <span>Nishat & Farjana Choice</span>
                </div>
                <i class="fas fa-play-circle"></i>
            </div>

            <div class="song-item" onclick="changeSong('dQw4w9WgXcQ', 'রোমান্টিক টিউন', this)">
                <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/default.jpg">
                <div class="song-info">
                    <div>রোমান্টিক টিউন</div>
                    <span>Special Moments</span>
                </div>
                <i class="fas fa-play-circle"></i>
            </div>

            <div class="song-item" onclick="changeSong('3jWRrafhO7M', 'অপেক্ষা', this)">
                <img src="https://img.youtube.com/vi/3jWRrafhO7M/default.jpg">
                <div class="song-info">
                    <div>অপেক্ষা</div>
                    <span>Heart Touching</span>
                </div>
                <i class="fas fa-play-circle"></i>
            </div>

            </div>
    </div>

    <script>
        function changeSong(videoId, title, element) {
            // প্লেয়ার আপডেট
            const player = document.getElementById('mainPlayer');
            player.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1&modestbranding=1&rel=0";
            
            // টাইটেল আপডেট
            document.getElementById('nowPlaying').innerText = "এখন চলছে: " + title;

            // একটিভ ক্লাস পরিবর্তন
            const items = document.querySelectorAll('.song-item');
            items.forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }
    </script>

</body>
</html>
