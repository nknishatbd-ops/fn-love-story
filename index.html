<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Story</title>
    <style>
        /* আপনার দেওয়া ছবির মতো ব্যাকগ্রাউন্ড থিম */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, #ffeef1 0%, #f7d1d7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #5d4a4a;
        }

        /* হেডার স্টাইল - ছবির সাইন ইন বক্সের মতো */
        header {
            text-align: center;
            padding: 40px 20px;
            width: 100%;
        }

        .heart-icon-main {
            font-size: 80px;
            color: #f06292;
            text-shadow: 0 10px 20px rgba(240, 98, 146, 0.3);
            margin-bottom: 10px;
            animation: beat 1.5s infinite;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 { margin: 10px 0; font-size: 2em; color: #333; font-weight: bold; }

        /* মিউজিক প্লেয়ার সেকশন */
        .player-container {
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.6);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px rgba(240, 98, 146, 0.1);
        }

        /* গ্যালারি গ্রিড */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 900px;
            padding: 20px;
        }

        /* লাভ আইকন ফটো কার্ড */
        .photo-card {
            position: relative;
            width: 180px;
            height: 180px;
            background: white;
            padding: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            /* লাভ শেপ ক্লিপিং */
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin: 0 auto;
        }

        .photo-card:hover {
            transform: scale(1.1) rotate(3deg);
            box-shadow: 0 15px 35px rgba(240, 98, 146, 0.2);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* পপ-আপ (Modal) স্টাইল - গ্লাসি লুক */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 240, 243, 0.4);
            backdrop-filter: blur(12px);
        }

        .modal-content {
            background: white;
            margin: 15% auto;
            padding: 30px;
            border-radius: 30px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 2px solid #fff;
            position: relative;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            color: #f06292;
            cursor: pointer;
        }

        .modal-content h2 { color: #f06292; margin-bottom: 15px; }
        .modal-content p { color: #666; line-height: 1.6; }

        /* বাটন স্টাইল */
        .btn-style {
            background: #f06292;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="heart-icon-main">❤️</div>
        <h1>Our Love Story</h1>
        <p style="color: #a18d8d;">Every moment with you is special</p>
    </header>

    <div class="player-container">
        <audio id="bgMusic" controls>
            <source src="music.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

    <div class="gallery">
        <div class="photo-card" onclick="showDetails('আমাদের প্রথম দেখা', 'সেই দিনটি ছিল খুব সুন্দর। আপনার ড্রেস আপ আর হাসিটা এখনো চোখে ভাসে।')">
            <img src="photo1.jpg" alt="Memory 1">
        </div>
        
        <div class="photo-card" onclick="showDetails('প্রিয় একটি মুহূর্ত', 'এই ছবিটা তোলার সময় আমরা কত হাসাহাসি করেছিলাম, মনে আছে?')">
            <img src="photo2.jpg" alt="Memory 2">
        </div>

        <div class="photo-card" onclick="showDetails('ভালোবাসার গল্প', 'এভাবেই সারা জীবন পাশে থাকতে চাই। আপনি আমার জীবনের শ্রেষ্ঠ প্রাপ্তি।')">
            <img src="photo3.jpg" alt="Memory 3">
        </div>
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div style="font-size: 40px; margin-bottom: 10px;">💖</div>
            <h2 id="modal-title"></h2>
            <p id="modal-text"></p>
            <button class="btn-style" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        function showDetails(title, text) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            document.getElementById('myModal').style.display = "block";
        }

        function closeModal() {
            document.getElementById('myModal').style.display = "none";
        }

        window.onclick = function(event) {
            let modal = document.getElementById('myModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>

</body>
    </html>
