<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NF Love Story - Our Premium Corner</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-pink: #f26891;
            --soft-pink-bg: #ffeef1;
            --glass-bg: rgba(255, 255, 255, 0.5);
        }

        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, #ffeef1 0%, #f7d1d7 100%);
            color: #5d4a4a; overflow-x: hidden;
        }

        /* হেডার */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 7%; background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 22px; font-weight: 700; }
        .logo span { color: var(--primary-pink); }

        /* হিরো সেকশন */
        .hero-container {
            display: grid; grid-template-columns: 1.2fr 1fr;
            padding: 40px 7%; align-items: center; gap: 30px;
        }
        .hero-text h1 { font-size: 40px; color: #222; }
        .hero-text h1 span { color: var(--primary-pink); }

        /* ফটো ব্লক */
        .photo-block {
            position: relative; width: 100%; height: 400px;
            border-radius: 30px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            background: #fff; border: 3px solid #fff;
        }
        .photo-block img { width: 100%; height: 100%; object-fit: cover; }

        /* ইউটিউব প্লেয়ার সেকশন - লোগো ছাড়া ভাইব */
        .youtube-container {
            width: 90%; max-width: 600px; margin: 30px auto;
            background: var(--glass-bg); padding: 15px;
            border-radius: 30px; border: 1px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .video-wrapper {
            position: relative; padding-bottom: 56.25%; height: 0;
            overflow: hidden; border-radius: 20px; background: #000;
        }
        .video-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 0;
        }

        /* অ্যাকশন বাটন (কল ও গেমস) */
        .action-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 15px; padding: 20px 7%;
        }
        .action-item {
            background: #fff; padding: 20px; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: inherit; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }
        .action-item:hover { transform: translateY(-5px); border: 1px solid var(--primary-pink); }
        .action-item i { font-size: 24px; color: var(--primary-pink); margin-bottom: 8px; }

        @media (max-width: 768px) {
            .hero-container { grid-template-columns: 1fr; text-align: center; }
            .action-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><span>NF</span> Love Story</div>
        <i class="fas fa-heart" style="color: var(--primary-pink);"></i>
    </header>

    <div class="hero-container">
        <div class="hero-text">
            <h1>Welcome to <span>NF</span> World</h1>
            <p>নিশাত এবং ফারজানার আড্ডা জোন। নিচে আপনার প্রিয় গান সার্চ করে প্লে করতে পারেন।</p>
        </div>

        <div class="photo-block">
            <img src="Screenshot_20260428-203759.jpg" alt="NF Photo">
        </div>
    </div>

    <div class="youtube-container">
        <h4 style="text-align: center; margin-bottom: 10px;">🎵 Play Your Favorite Music</h4>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed?listType=search&list=romantic+bangla+songs&modestbranding=1&rel=0" allowfullscreen></iframe>
        </div>
        <p style="font-size: 11px; text-align: center; margin-top: 10px; color: #888;">এখানে সরাসরি গান প্লে করুন</p>
    </div>

    <h3 style="text-align: center; margin-top: 20px;">Adda & Fun Zone</h3>
    <div class="action-grid">
        <a href="https://meet.jit.si/NF-Love-Story-Room" target="_blank" class="action-item">
            <i class="fas fa-video"></i><span>ভিডিও কল</span>
        </a>
        
        <a href="https://m.me/your-profile" target="_blank" class="action-item">
            <i class="fas fa-comments"></i><span>এসএমএস</span>
        </a>
        
        <a href="https://www.ludoking.com/" target="_blank" class="action-item">
            <i class="fas fa-dice"></i><span>লুডু খেলি</span>
        </a>
        
        <a href="https://poki.com/en/2-player" target="_blank" class="action-item">
            <i class="fas fa-gamepad"></i><span>আড্ডা গেমস</span>
        </a>
    </div>

    <footer style="text-align: center; padding: 30px; font-size: 12px; color: #aaa;">
        © 2026 NF Love Story | Created for Nishat & Farjana ❤️
    </footer>

</body>
</html>
