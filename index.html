<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Story</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, #ffeef1 0%, #f7d1d7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #5d4a4a;
        }

        header {
            text-align: center;
            padding: 30px 20px;
        }

        .heart-icon-main {
            font-size: 60px;
            color: #f06292;
            animation: beat 1.5s infinite;
            text-shadow: 0 5px 15px rgba(240, 98, 146, 0.3);
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 { margin: 10px 0; font-size: 2.2em; color: #333; font-weight: bold; }

        /* ইউটিউব ভিডিও প্লেয়ার স্টাইল */
        .video-wrapper {
            width: 90%;
            max-width: 450px;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.4);
            padding: 15px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 15px 35px rgba(240, 98, 146, 0.1);
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 800px;
            padding: 20px;
        }

        .photo-card {
            position: relative;
            width: 160px;
            height: 160px;
            background: white;
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            cursor: pointer;
            transition: all 0.4s ease;
            margin: 0 auto;
        }

        .photo-card:hover { transform: scale(1.1) rotate(5deg); }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }

        /* পপ-আপ মডাল */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(255, 240, 243, 0.6);
            backdrop-filter: blur(15px);
        }

        .modal-content {
            background: white;
            margin: 15% auto;
            padding: 30px;
            border-radius: 30px;
            width: 80%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            position: relative;
        }

        .close { 
            position: absolute;
            top: 15px; right: 20px;
            font-size: 28px; cursor: pointer; color: #f06292; 
        }
    </style>
</head>
<body>

    <header>
        <div class="heart-icon-main">❤️</div>
        <h1>Our Love Story</h1>
        <p style="color: #a18d8d;">Every song reminds me of you</p>
    </header>

    <div class="video-wrapper">
        <div class="video-container">
            <iframe id="loveVideo" src="https://www.youtube.com/embed/-Hj-4hqUaaI?autoplay=0&rel=0" 
                    title="Romantic Music Player" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
            </iframe>
        </div>
    </div>

    <div class="gallery">
        <div class="photo-card" onclick="showDetails('প্রথম দিন', 'আপনার সাথে কাটানো প্রথম সেই দিনটির স্মৃতি আমি আজও মনে রেখেছি।')">
            <img src="photo1.jpg" alt="Memory 1">
        </div>
        <div class="photo-card" onclick="showDetails('প্রিয় মুহূর্ত', 'এই হাসিমাখা মুখটা দেখার জন্যই তো বেঁচে থাকা।')">
            <img src="photo2.jpg" alt="Memory 2">
        </div>
        <div class="photo-card" onclick="showDetails('ভালোবাসার গল্প', 'এভাবেই সারা জীবন গানের সুরে সুরে আপনার পাশে থাকতে চাই।')">
            <img src="photo3.jpg" alt="Memory 3">
        </div>
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div style="font-size: 45px; margin-bottom: 10px;">💖</div>
            <h2 id="modal-title" style="color: #f06292;"></h2>
            <p id="modal-text" style="color: #666; line-height: 1.6;"></p>
        </div>
    </div>

    <script>
        function showDetails(title, text) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            document.getElementById('myModal').style.display = "block";
        }

        function closeModal() {
            document.getElementById('myModal').style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('myModal')) {
                closeModal();
            }
        }
    </script>

</body>
</html>
