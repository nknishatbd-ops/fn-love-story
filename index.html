<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Story</title>
    <style>
        /* ব্যাকগ্রাউন্ড পিংক গ্লাসি থিম */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #4a4a4a;
        }

        header {
            text-align: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 2.5em; color: #d63384; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }

        /* মিউজিক প্লেয়ার সেকশন */
        .player-container {
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.3);
            padding: 15px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* গ্যালারি গ্রিড */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1000px;
            padding: 20px;
        }

        /* ছবিগুলো লাভ আইকনের ভেতরে */
        .photo-card {
            position: relative;
            width: 200px;
            height: 200px;
            background-color: white;
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            cursor: pointer;
            transition: transform 0.3s ease;
            margin: 0 auto;
        }

        .photo-card:hover {
            transform: scale(1.1);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* পপ-আপ (Modal) স্টাইল */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.9);
            margin: 10% auto;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideDown 0.4s;
        }

        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close {
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #d63384;
        }

        #modal-text {
            line-height: 1.6;
            font-size: 1.1em;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Our Love Story 💖</h1>
    </header>

    <div class="player-container">
        <audio controls>
            <source src="music.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

    <div class="gallery">
        <div class="photo-card" onclick="showDetails('আমাদের প্রথম কথা...', 'এখানে আপনার প্রথম কথা বলার তারিখ এবং বিস্তারিত স্মৃতি লিখুন।')">
            <img src="photo1.jpg" alt="Memory 1">
        </div>
        
        <div class="photo-card" onclick="showDetails('বিশেষ একটি দিন', 'এই দিনটি আমাদের জন্য খুব স্পেশাল ছিল কারণ...')">
            <img src="photo2.jpg" alt="Memory 2">
        </div>

        </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title" style="color: #d63384;"></h2>
            <p id="modal-text"></p>
        </div>
    </div>

    <script>
        function showDetails(title, text) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            document.getElementById('myModal').style.display = "block";
        }

        function closeModal() {
            document.getElementById('myModal').style.display = "none";
        }

        window.onclick = function(event) {
            let modal = document.getElementById('myModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>

</body>
</html>
